services:
  db:
    image: postgres:16-alpine
    container_name: grantmatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: grantmatch
      POSTGRES_PASSWORD: grantmatch
      POSTGRES_DB: grantmatch
    ports:
      - "5432:5432"
    volumes:
      - grantmatch_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grantmatch -d grantmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: grantmatch-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://grantmatch:grantmatch@db:5432/grantmatch
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  grantmatch_pgdata:
